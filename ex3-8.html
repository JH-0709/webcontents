<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>버튼이 있는 입력 폼</title>
    </head>
    <body>
        <h3>버튼을 만들자</h3>
        <hr>
        <form>
            검색 : <input type="text" size="10" value="">
                   <input type="button" size="10" value="Q1"> 
                   <button type="button">Q2</button><br>
            submit 버튼 : <input type="submit" value="전송1">
                         <button type="text">전송</button><br>
            reset 버튼 : <input type="reset" size="10" value="리셋1">
                        <button type="reset">리셋2</button><br>
            이미지버튼 : <input type="image" src="media/button.png" alt="이미지 버튼">
                        <button type="button">
                            <img src="media/button.png" alt="이미지 버튼"></button>
        </form>
    </body>
</html>
