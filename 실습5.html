<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>도형 서식 폼 만들기</title>
    </head>
    <body>
        <h3>도형 서식 만들기</h3>
        <hr>
        <form>
            선종류
            <select name="line" size="3">
                <option value="1">선없음</option>
                <option value="2">실선</option>
                <option value="3">점선</option>
            </select><br><br>
            선두께
            <input type="number" min="0" max="100" step="1">
            선색
            <input type="color" value="#00BFFF"
                onchange="document.body.style.color=this.value"><br><br>
            투명도(0~100): 
            <input type="range" min="0" max="100" list="tra">
            <datalist id="tra">
                <option value="10" label="Low"></option>
                <option value="50" label="Medium"></option>
                <option value="90" label="High"></option>
            </datalist>       
        </form>
    </body>
</html>
