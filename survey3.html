<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
            <h1>설문지</h1>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        </header>
        <section>
            <hr>
            <form>
                <article>
                    학년
                    <label><input type="radio" name="schoolyear" value="1">1학년</label>
                    <label><input type="radio" name="schoolyear" value="2">2학년</label>
                    <label><input type="radio" name="schoolyear" value="3">3학년</label>
                </article>
                <article>
                    성별
                    <label><input type="radio" name="gender" value="1">남</label>
                    <label><input type="radio" name="gender" value="2">여</label>
                </article>
                <article>
                    관심 분야
                    <select name="interest">
                        <option value="1" selected>게임</option>
                        <option value="2">프로그래밍 언어</option>
                        <option value="3">하드웨어</option>
                        <option value="4">인공지능</option>
                    </select>
                </article>
                <article>
                    진로
                    개발<input type="checkbox" value="1">
                    기획<input type="checkbox" value="2">
                    영업<input type="checkbox" value="3">
                    창업<input type="checkbox" value="4">
                </article>
            </form>
        </section>
    </body>
</html>
